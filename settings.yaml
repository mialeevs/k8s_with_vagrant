cluster_name: Kubernetes-Parallels-Cluster
environment: development

network:
  dns_servers:
    - 1.1.1.1
    - 8.8.8.8
  pod_cidr: 10.244.0.0/16
  service_cidr: 10.96.0.0/12
  control_ip: 192.168.1.100
  worker_ip_prefix: 192.168.1
  worker_start_ip: 11

nodes:
  control:
    cpu: 2
    memory: 6144
  workers:
    count: 1
    cpu: 2
    memory: 6144

software:
  box: bento/ubuntu-24.04
  kubernetes: v1.34
  crio: v1.35
  calico: v3.28.2
  os: xUbuntu_24.04

shared_folders:
  - host_path: ./configs
    vm_path: /vagrant/configs
    owner: vagrant
    group: vagrant